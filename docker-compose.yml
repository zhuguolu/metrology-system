services:
  mysql:
    image: mysql:5.7
    container_name: metrology-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-metrology_db}
      MYSQL_USER: ${MYSQL_USER:-metrology}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-metrology123}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 20s
      retries: 15
    networks:
      - metrology-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metrology-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Duser.timezone=Asia/Shanghai}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-metrology_db}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-metrology}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-metrology123}
      JWT_SECRET: ${JWT_SECRET:-metrology-jwt-secret-key-at-least-32-chars-2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      CMS_ROOT_PATH: ${CMS_ROOT_PATH:-/app/cms}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./:/app/cms
    networks:
      - metrology-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: metrology-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - metrology-net

volumes:
  mysql_data:

networks:
  metrology-net:
    driver: bridge
