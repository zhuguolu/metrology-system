name: iOS Unsigned IPA
# CI workflow for unsigned iOS IPA artifacts

on:
  workflow_dispatch:
    inputs:
      app_dir:
        description: "iOS app directory (contains project.yml)"
        required: false
        default: "ios-app"
      scheme:
        description: "Optional scheme override"
        required: false
        default: ""
      configuration:
        description: "Build configuration"
        required: false
        default: "Release"
      min_ipa_mb:
        description: "Minimum uncompressed .app size in MB (default 1, smaller => fail)"
        required: false
        default: "1"
  push:
    paths:
      - "ios-app/**"
      - "**/project.yml"
      - ".github/workflows/ios-unsigned-ipa.yml"
      - "scripts/build_unsigned_ipa.sh"
      - "ios-app/scripts/build_unsigned_ipa.sh"

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          CANDIDATE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [ -z "$CANDIDATE" ]; then
            echo "::error::Xcode 26 not found on runner. Installed Xcode apps:"
            ls -1 /Applications | grep '^Xcode' || true
            exit 2
          fi
          sudo xcode-select -s "$CANDIDATE/Contents/Developer"

      - name: Show Toolchain
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
            xcodegen --version
          fi

      - name: Build Unsigned IPA
        env:
          INPUT_APP_DIR: ${{ github.event.inputs.app_dir }}
          INPUT_SCHEME: ${{ github.event.inputs.scheme }}
          INPUT_CONFIGURATION: ${{ github.event.inputs.configuration }}
          INPUT_MIN_APP_BUNDLE_MB: ${{ github.event.inputs.min_ipa_mb }}
        run: |
          set +e
          chmod +x scripts/build_unsigned_ipa.sh
          APP_DIR="${INPUT_APP_DIR:-ios-app}"
          if [ -z "$APP_DIR" ] || [ "$APP_DIR" = "null" ]; then
            APP_DIR="ios-app"
          fi
          CONFIGURATION="${INPUT_CONFIGURATION:-Release}"
          if [ -z "$CONFIGURATION" ] || [ "$CONFIGURATION" = "null" ]; then
            CONFIGURATION="Release"
          fi
          SCHEME="${INPUT_SCHEME:-}"
          if [ "$SCHEME" = "null" ]; then
            SCHEME=""
          fi
          MIN_APP_BUNDLE_MB="${INPUT_MIN_APP_BUNDLE_MB:-1}"
          if [ -z "$MIN_APP_BUNDLE_MB" ] || [ "$MIN_APP_BUNDLE_MB" = "null" ]; then
            MIN_APP_BUNDLE_MB="1"
          fi
          MIN_APP_BUNDLE_SIZE_MB="$MIN_APP_BUNDLE_MB" MIN_IPA_SIZE_MB="$MIN_APP_BUNDLE_MB" ./scripts/build_unsigned_ipa.sh "$APP_DIR" "$SCHEME" "$CONFIGURATION" > build_unsigned_ipa.log 2>&1
          EXIT_CODE=$?
          tail -n 200 build_unsigned_ipa.log || true
          if [ "$EXIT_CODE" -ne 0 ]; then
            LAST_LINES="$(tail -n 20 build_unsigned_ipa.log | tr '\n' ' ' | sed 's/[[:space:]]\\+/ /g')"
            ERROR_LINES="$(grep -n ' error:' build_unsigned_ipa.log | tail -n 20 | tr '\n' ' ' | sed 's/[[:space:]]\\+/ /g' || true)"
            if [ -n "$ERROR_LINES" ]; then
              echo "::error::Unsigned IPA build failed (exit=$EXIT_CODE): $ERROR_LINES"
            else
              echo "::error::Unsigned IPA build failed (exit=$EXIT_CODE): $LAST_LINES"
            fi
            exit "$EXIT_CODE"
          fi

      - name: Upload Unsigned IPA Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('{0}-unsigned-ipa', github.event.inputs.app_dir || 'ios-app') }}
          path: ${{ format('{0}/build/artifacts/**', github.event.inputs.app_dir || 'ios-app') }}
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('{0}-build-log', github.event.inputs.app_dir || 'ios-app') }}
          path: build_unsigned_ipa.log
          retention-days: 14
          if-no-files-found: warn
