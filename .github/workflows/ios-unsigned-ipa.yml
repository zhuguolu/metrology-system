name: iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      app_dir:
        description: "iOS app directory (contains project.yml)"
        required: false
        default: "ios-app"
      scheme:
        description: "Optional scheme override"
        required: false
        default: ""
      configuration:
        description: "Build configuration"
        required: false
        default: "Release"
  push:
    paths:
      - "**/project.yml"
      - ".github/workflows/ios-unsigned-ipa.yml"
      - "scripts/build_unsigned_ipa.sh"
      - "ios-app/scripts/build_unsigned_ipa.sh"

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-ipa:
    runs-on: macos-14
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Toolchain
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
            xcodegen --version
          fi

      - name: Build Unsigned IPA
        env:
          INPUT_APP_DIR: ${{ github.event.inputs.app_dir }}
          INPUT_SCHEME: ${{ github.event.inputs.scheme }}
          INPUT_CONFIGURATION: ${{ github.event.inputs.configuration }}
        run: |
          chmod +x scripts/build_unsigned_ipa.sh
          APP_DIR="${INPUT_APP_DIR:-ios-app}"
          CONFIGURATION="${INPUT_CONFIGURATION:-Release}"
          SCHEME="${INPUT_SCHEME:-}"
          ./scripts/build_unsigned_ipa.sh "$APP_DIR" "$SCHEME" "$CONFIGURATION"

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('{0}-unsigned-ipa', github.event.inputs.app_dir || 'ios-app') }}
          path: ${{ format('{0}/build/artifacts/**', github.event.inputs.app_dir || 'ios-app') }}
          retention-days: 14
          if-no-files-found: error
