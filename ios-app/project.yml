name: MetrologyiOS
options:
  minimumXcodeGenVersion: 2.38.0
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
targets:
  MetrologyiOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrology.ios
        PRODUCT_NAME: MetrologyiOS
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_CFBundleDisplayName: 校准管理系统
        INFOPLIST_KEY_CFBundleName: 校准管理系统
    info:
      path: Sources/Resources/Info.plist
schemes:
  MetrologyiOS:
    build:
      targets:
        MetrologyiOS: all
